name: Deploy docs

# Rebuilds the Docusaurus site and deploys it to S3 + CloudFront on every push
# to the `docs` branch (or via manual dispatch). AWS credentials are read from
# repository secrets -- never hardcoded.
#
# Required repository secrets:
#   AWS_ACCESS_KEY_ID       - IAM key with s3:PutObject/ListBucket on the bucket
#                             and cloudfront:CreateInvalidation on the dist.
#   AWS_SECRET_ACCESS_KEY   - matching secret.
# Optional repository variables (fall back to the provisioned defaults):
#   AWS_REGION              - default ap-south-2
#   DOCS_BUCKET             - default graft-docs-site-101541766996
#   DOCS_DISTRIBUTION_ID    - default E1QVJYMRGE45D1

on:
  push:
    branches: [docs]
  workflow_dispatch: {}

# Avoid overlapping deploys racing on the same bucket/distribution.
concurrency:
  group: deploy-docs
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'ap-south-2' }}
      DOCS_BUCKET: ${{ vars.DOCS_BUCKET || 'graft-docs-site-101541766996' }}
      DOCS_DISTRIBUTION_ID: ${{ vars.DOCS_DISTRIBUTION_ID || 'E1QVJYMRGE45D1' }}
    defaults:
      run:
        working-directory: website
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node + pnpm
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable pnpm via corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build site
        # The committed `versioned_docs/` + `versions.json` are built as-is, so
        # every released docs version ships. See "Docs versioning" below.
        run: pnpm build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync to S3
        # Long-cache the fingerprinted assets, short-cache the HTML so new
        # deploys are picked up after the invalidation below.
        run: |
          aws s3 sync build/ "s3://${DOCS_BUCKET}/" --delete \
            --exclude "*.html" \
            --cache-control "public,max-age=31536000,immutable"
          aws s3 sync build/ "s3://${DOCS_BUCKET}/" --delete \
            --exclude "*" --include "*.html" \
            --cache-control "public,max-age=0,must-revalidate"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${DOCS_DISTRIBUTION_ID}" \
            --paths "/*"
